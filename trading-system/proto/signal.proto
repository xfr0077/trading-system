syntax = "proto3";

package signal;

service SignalService {
  rpc SendSignal(TradingSignal) returns (SignalAck);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message TradingSignal {
  string signal_id = 1;
  string symbol = 2;
  string action = 3;  // "long", "short", "close"
  double stop_loss = 4;
  double take_profit = 5;
  double confidence = 6;
  double position_size = 7;
  int64 timestamp = 8;
  double signal_price = 9;
  int32 max_slippage_bps = 10;
  // Phase 3 新增
  int64 order_ttl_ms = 11;      // 订单超时时间（毫秒）
  string order_type = 12;       // "limit" 或 "market"
}

message PositionInfo {
  string symbol = 1;
  string side = 2;      // "long", "short", ""
  double size = 3;
  double entry_price = 4;
  double unrealized_pnl = 5;
  double realized_pnl = 6;
}

message SignalAck {
  string signal_id = 1;
  bool accepted = 2;
  string reason = 3;
  PositionInfo position = 4;   // 当前币种的持仓信息（如果有）
}

message HealthRequest {}
message HealthResponse {
  bool healthy = 1;
  string version = 2;
}
