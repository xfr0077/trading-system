services:
  ts-engine:
    build:
      context: .
      dockerfile: ts-engine/Dockerfile
    ports:
      - "50051:50051"
      - "80:80"
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - GRVT_ENV=${GRVT_ENV:-testnet}
      - DEX=${DEX:-lighter}
      - DEX_ENV=${DEX_ENV:-mainnet}
      - REDIS_URL=redis://redis:6379
      - SQLITE_PATH=/data/trades.db
      - DASHBOARD_PORT=80
      - MAX_POSITION_SIZE=${MAX_POSITION_SIZE:-0.1}
      - MAX_CONCURRENT_SIGNALS=${MAX_CONCURRENT_SIGNALS:-3}
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-60}
      - MAX_PRICE_DEVIATION_PCT=${MAX_PRICE_DEVIATION_PCT:-0.5}
      - MAX_DAILY_LOSS=${MAX_DAILY_LOSS:-500}
      - SIGNAL_TTL_MS=${SIGNAL_TTL_MS:-300000}
      - MARGIN_WARNING_THRESHOLD=${MARGIN_WARNING_THRESHOLD:-0.7}
      - MARGIN_CRITICAL_THRESHOLD=${MARGIN_CRITICAL_THRESHOLD:-0.9}
      - PAPER_TRADING=true
      - TAILSCALE_AI_IP=${TAILSCALE_AI_IP}
      - LIGHTER_API_KEY_INDEX=${LIGHTER_API_KEY_INDEX}
      - LIGHTER_API_PRIVATE_KEY=${LIGHTER_API_PRIVATE_KEY}
      - LIGHTER_BASE_URL=${LIGHTER_BASE_URL}
      - LIGHTER_ACCOUNT_INDEX=${LIGHTER_ACCOUNT_INDEX}
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - SYMBOLS=${SYMBOLS}
    volumes:
      - ts-data:/data
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(50051, 'localhost').on('error', () => process.exit(1)).on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  python-ai:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - TS_ENGINE_GRPC_URL=ts-engine:50051
      - MODEL_PATH=/app/models/model.onnx
      - CONFIDENCE_THRESHOLD=50
      - FEATURE_WINDOW=60
      - STOP_LOSS_PCT=0.02
      - TAKE_PROFIT_PCT=0.05
      - MAX_SLIPPAGE_BPS=10
      - POSITION_SIZE=${MAX_POSITION_SIZE:-0.1}
      - USE_LEGACY_FEATURES=false
    depends_on:
      redis:
        condition: service_healthy
      ts-engine:
        condition: service_healthy
    restart: always

volumes:
  redis_data:
  ts-data:
