services:
  ts-engine:
    build: ./ts-engine
    ports:
      - "50051:50051"
    environment:
      - GRVT_API_KEY=${GRVT_API_KEY}
      - GRVT_ENV=${GRVT_ENV:-testnet}
      - REDIS_URL=redis://redis:6379
      - SQLITE_PATH=/data/trades.db
      - TAILSCALE_AI_IP=${TAILSCALE_AI_IP}
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(50051, 'localhost').on('error', () => process.exit(1)).on('connect', () => process.exit(0))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
